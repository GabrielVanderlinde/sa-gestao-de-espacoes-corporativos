<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Visualizar Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-warning" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Gestão de Espaços Corporativos</a>
        <button class="navbar-toggler" data-bs-target="#menuPrincipal" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/reservalista}">Reservas</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Sair</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-1">Visualizar Reserva</h1>
                    <p class="text-secondary mb-0">Detalhes da reserva selecionada.</p>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">ID</label>
                        <input class="form-control" disabled th:value="${reserva.id}" type="text">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuário</label>
                        <input class="form-control" disabled th:value="${reserva.nomeUsuario}" type="text">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Espaço/Recurso</label>
                        <input class="form-control" disabled th:value="${reserva.descricaoRecurso}" type="text">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Data</label>
                        <input class="form-control" disabled th:value="${reserva.data}" type="text">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Hora Inicial</label>
                        <input class="form-control" disabled th:value="${reserva.horaInicial}" type="text">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Hora Final</label>
                        <input class="form-control" disabled th:value="${reserva.horaFinal}" type="text">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Status</label>
                        <div>
                            <span class="badge bg-secondary" th:if="${reserva.cancelamento != null}">Cancelada</span>
                            <span class="badge bg-success" th:unless="${reserva.cancelamento != null}">Ativa</span>
                        </div>
                    </div>
                    <div class="mb-3" th:if="${reserva.cancelamento != null}">
                        <label class="form-label fw-bold">Data de Cancelamento</label>
                        <input class="form-control" disabled th:value="${reserva.cancelamento}" type="text">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Observação</label>
                        <textarea class="form-control" disabled rows="3" th:text="${reserva.observacao}"></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a class="btn btn-outline-secondary" th:href="@{/reservalista}">Voltar</a>
                        <a class="btn btn-outline-warning" th:href="@{/reservacancelar/{id}(id=${reserva.id})}"
                           th:unless="${reserva.cancelamento != null}">Cancelar Reserva</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<footer class="footer"><Strong>Equipe: Meta</Strong></footer>
<style>.footer { position: fixed; bottom: 10px; right: 10px; font-size: 14px; color: #000; }</style>
</body>
</html>
