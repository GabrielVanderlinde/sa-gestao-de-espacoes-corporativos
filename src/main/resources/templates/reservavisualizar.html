<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visualizar Reserva</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-warning" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">Gestão de Espaços Corporativos</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menuPrincipal">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/reservalista}">Reservas</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/logout}">Sair</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h3 mb-1">Visualizar Reserva</h1>
          <p class="text-secondary mb-0">Detalhes da reserva selecionada.</p>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-bold">ID</label>
            <input type="text" class="form-control" th:value="${reserva.id}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Usuário ID</label>
            <input type="text" class="form-control" th:value="${reserva.usuarioId}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Recurso ID</label>
            <input type="text" class="form-control" th:value="${reserva.recursoId}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Data</label>
            <input type="text" class="form-control" th:value="${reserva.data}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Hora Inicial</label>
            <input type="text" class="form-control" th:value="${reserva.horaInicial}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Hora Final</label>
            <input type="text" class="form-control" th:value="${reserva.horaFinal}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Status</label>
            <div>
              <span th:if="${reserva.cancelamento != null}" class="badge bg-secondary">Cancelada em <span th:text="${reserva.cancelamento}"></span></span>
              <span th:unless="${reserva.cancelamento != null}" class="badge bg-success">Ativa</span>
            </div>
          </div>
          <div class="mb-3" th:if="${reserva.cancelamento != null}">
            <label class="form-label fw-bold">Observação do Cancelamento</label>
            <textarea class="form-control" rows="3" disabled th:text="${reserva.observacao}"></textarea>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/reservalista}">Voltar</a>
            <a class="btn btn-outline-warning" th:href="@{/reservacancelar/{id}(id=${reserva.id})}" th:unless="${reserva.cancelamento != null}">Cancelar Reserva</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<footer class="footer">
  <Strong>Equipe: Meta</Strong>
</footer>
<style>
  .footer { position: fixed; bottom: 10px; right: 10px; font-size: 14px; color: #000; }
</style>

</body>
</html>
