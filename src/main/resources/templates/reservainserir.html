<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Cadastrar Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-warning" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Gestão de Espaços Corporativos</a>
        <button class="navbar-toggler" data-bs-target="#menuPrincipal" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/reservalista}">Reservas</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/login}">Sair</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-1">Cadastrar Reservas</h1>
                    <p class="text-secondary mb-0">Preencha os dados para criar um novo cadastro.</p>
                </div>
            </div>

            <!-- INOVAÇÃO 3: Aviso de limite de reservas -->
            <div class="alert alert-info" id="avisoLimite" style="display:none;">
                <span id="textoLimite"></span>
            </div>

            <div class="alert alert-danger" th:if="${erroLimite}" th:text="${erroLimite}"></div>
            <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="post" th:action="@{/reservainserir}" th:object="${reserva}">

                        <div class="mb-3">
                            <label class="form-label" for="usuarioId">Usuário</label>
                            <select class="form-select" id="usuarioId" th:field="*{usuarioId}" required>
                                <option value="">Selecione o usuário...</option>
                                <option th:each="usuario : ${usuarios}"
                                        th:value="${usuario.id}"
                                        th:text="${usuario.nome}">
                                </option>
                            </select>
                            <div class="text-danger small mt-1" th:errors="*{usuarioId}"
                                 th:if="${#fields.hasErrors('usuarioId')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="recursoId">Recurso</label>
                            <select class="form-select" id="recursoId" th:field="*{recursoId}" required>
                                <option value="">Selecione o recurso...</option>
                                <option th:each="recurso : ${recursos}"
                                        th:value="${recurso.id}"
                                        th:text="${recurso.descricao}">
                                </option>
                            </select>
                            <div class="text-danger small mt-1" th:errors="*{recursoId}"
                                 th:if="${#fields.hasErrors('recursoId')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="data">Data</label>
                            <input class="form-control" id="data" required th:field="*{data}" type="date">
                            <div class="text-danger small mt-1" th:errors="*{data}"
                                 th:if="${#fields.hasErrors('data')}"></div>
                        </div>

                        <!-- INOVAÇÃO 2: Horário automático baseado no recurso -->
                        <div class="mb-3">
                            <label class="form-label" for="horaInicial">Hora Inicial</label>
                            <input class="form-control" id="horaInicial" required th:field="*{horaInicial}" type="time">
                            <div class="text-danger small mt-1" th:errors="*{horaInicial}"
                                 th:if="${#fields.hasErrors('horaInicial')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="horaFinal">Hora Final</label>
                            <input class="form-control" id="horaFinal" required th:field="*{horaFinal}" type="time">
                            <div class="text-danger small mt-1" th:errors="*{horaFinal}"
                                 th:if="${#fields.hasErrors('horaFinal')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="observacao">Observação</label>
                            <input class="form-control" id="observacao" placeholder="Observação (opcional)" th:field="*{observacao}"
                                   type="text">
                            <div class="text-danger small mt-1" th:errors="*{observacao}"
                                 th:if="${#fields.hasErrors('observacao')}"></div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a class="btn btn-outline-secondary" th:href="@{/reservalista}">Cancelar</a>
                            <button class="btn btn-primary" type="submit">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // INOVAÇÃO 2: Preenchimento automático de horário ao selecionar recurso
    document.getElementById('recursoId').addEventListener('change', function() {
        var recursoId = this.value;
        if (recursoId) {
            fetch('/api/recurso/' + recursoId + '/horarios')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.horaInicialAgendamento) {
                        document.getElementById('horaInicial').value = data.horaInicialAgendamento;
                    }
                    if (data.horaFinalAgendamento) {
                        document.getElementById('horaFinal').value = data.horaFinalAgendamento;
                    }
                })
                .catch(function() {});
        }
    });

    // INOVAÇÃO 3: Verificar limite de reservas ao informar usuário
    document.getElementById('usuarioId').addEventListener('change', function() {
        var usuarioId = this.value;
        if (usuarioId) {
            fetch('/api/usuario/' + usuarioId + '/reservas')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    var aviso = document.getElementById('avisoLimite');
                    var texto = document.getElementById('textoLimite');
                    if (data.podeCriar) {
                        aviso.className = 'alert alert-info';
                        texto.textContent = 'Reservas utilizadas: ' + data.count + ' de ' + data.max;
                    } else {
                        aviso.className = 'alert alert-warning';
                        texto.textContent = 'Limite atingido! Você já possui ' + data.count + ' reservas ativas (máximo: ' + data.max + ')';
                    }
                    aviso.style.display = 'block';
                })
                .catch(function() {});
        }
    });
</script>

<footer class="footer">
    <Strong>Equipe: Meta</Strong>
</footer>
<style>
    .footer { position: fixed; bottom: 10px; right: 10px; font-size: 14px; color: #000; }
</style>

</body>
</html>
