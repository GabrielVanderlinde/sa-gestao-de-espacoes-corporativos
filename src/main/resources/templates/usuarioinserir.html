<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Cadastrar usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-success" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Gestão de Espaços Corporativos</a>

        <button aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu" class="navbar-toggler"
                data-bs-target="#menuPrincipal" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a aria-current="page" class="nav-link active" th:href="@{/usuariolista}">Usuários</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-1">Cadastrar usuário</h1>
                    <p class="text-secondary mb-0">Preencha os dados para criar um novo cadastro.</p>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>
                    <form method="post" th:action="@{/usuarioinserir}" th:object="${usuario}">
                        <!-- obeject vale como objeto que recebe todo o dto-->

                        <div class="mb-3">
                            <label class="form-label" for="nome">Nome</label>
                            <input class="form-control" id="nome" placeholder="Digite o nome completo" required
                                   th:field="*{nome}" type="text">
                            <div class="text-danger small mt-1" th:errors="*{nome}"
                                 th:if="${#fields.hasErrors('nome')}">Erro no nome
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="email">E-mail</label>
                            <input class="form-control" id="email" placeholder="Digite o e-mail" required
                                   th:field="*{email}" type="email">
                            <div class="text-danger small mt-1" th:errors="*{email}"
                                 th:if="${#fields.hasErrors('email')}">Erro no e-mail
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="senha">Senha</label>
                            <input class="form-control" id="senha" placeholder="Digite a senha" required
                                   th:field="*{senha}" type="password">
                            <div class="text-danger small mt-1" th:errors="*{senha}"
                                 th:if="${#fields.hasErrors('senha')}">Erro na senha
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="matricula">Matrícula</label>
                            <input class="form-control" id="matricula" placeholder="Digite a matrícula" required
                                   th:field="*{matricula}" type="text">
                            <div class="text-danger small mt-1" th:errors="*{matricula}"
                                 th:if="${#fields.hasErrors('matricula')}">Erro na matrícula
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="dataNascimento">Data de Nascimento</label>
                            <input class="form-control" id="dataNascimento" placeholder="Digite a data de nascimento" required
                                   th:field="*{dataNascimento}" type="date">
                            <div class="text-danger small mt-1" th:errors="*{dataNascimento}"
                                 th:if="${#fields.hasErrors('dataNascimento')}">Erro na data
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a class="btn btn-outline-secondary" th:href="@{/usuariolista}">Cancelar</a>
                            <button class="btn btn-primary" type="submit">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<footer class="footer">
    <Strong>Equipe: Meta</Strong>
</footer>
<style>
    .footer {
        position: fixed;
        bottom: 10px;
        right: 10px;
        font-size: 14px;
        color: #000;
    }
</style>

</body>
</html>
