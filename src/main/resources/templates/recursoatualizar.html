<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Atualizar Espaços</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .footer { position: fixed; bottom: 10px; right: 10px; font-size: 14px; color: #000; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; }
        .checkbox-group .form-check { min-width: 140px; }
        .checkbox-group .form-check-input:checked { background-color: #0d6efd; border-color: #0d6efd; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Gestão de Espaços Corporativos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">Home</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/recursolista}">Espaços</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/login}">Sair</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-1">Atualizar Espaço</h1>
                    <p class="text-secondary mb-0">Altere os dados do cadastro selecionado.</p>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>
                    <form method="post" th:action="@{/recursoatualizar}" th:object="${recurso}">
                        <input th:field="*{id}" type="hidden">

                        <div class="mb-3">
                            <label class="form-label" for="descricao">Descrição</label>
                            <input class="form-control" id="descricao" placeholder="Digite a descrição do espaço"
                                   th:field="*{descricao}" type="text">
                            <div class="text-danger small mt-1" th:errors="*{descricao}"
                                 th:if="${#fields.hasErrors('descricao')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="tipo">Tipo</label>
                            <input class="form-control" id="tipo" placeholder="Ex: sala, equipamento"
                                   th:field="*{tipo}" type="text">
                            <div class="text-danger small mt-1" th:errors="*{tipo}"
                                 th:if="${#fields.hasErrors('tipo')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Dias da Semana Disponível</label>
                            <input type="hidden" id="diasSemanaDisponivel" th:field="*{diasSemanaDisponivel}">
                            <div class="checkbox-group mt-2">
                                <div class="form-check">
                                    <input class="form-check-input dia-check" type="checkbox" value="Segunda-feira" id="dia1">
                                    <label class="form-check-label" for="dia1">Segunda-feira</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input dia-check" type="checkbox" value="Terça-feira" id="dia2">
                                    <label class="form-check-label" for="dia2">Terça-feira</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input dia-check" type="checkbox" value="Quarta-feira" id="dia3">
                                    <label class="form-check-label" for="dia3">Quarta-feira</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input dia-check" type="checkbox" value="Quinta-feira" id="dia4">
                                    <label class="form-check-label" for="dia4">Quinta-feira</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input dia-check" type="checkbox" value="Sexta-feira" id="dia5">
                                    <label class="form-check-label" for="dia5">Sexta-feira</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input dia-check" type="checkbox" value="Sábado" id="dia6">
                                    <label class="form-check-label" for="dia6">Sábado</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input dia-check" type="checkbox" value="Domingo" id="dia7">
                                    <label class="form-check-label" for="dia7">Domingo</label>
                                </div>
                            </div>
                            <div class="text-danger small mt-1" th:errors="*{diasSemanaDisponivel}"
                                 th:if="${#fields.hasErrors('diasSemanaDisponivel')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="dataInicialAgendamento">Data Inicial Agendamento</label>
                            <input class="form-control" id="dataInicialAgendamento"
                                   th:field="*{dataInicialAgendamento}" type="date">
                            <div class="text-danger small mt-1" th:errors="*{dataInicialAgendamento}"
                                 th:if="${#fields.hasErrors('dataInicialAgendamento')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="dataFinalAgendamento">Data Final Agendamento</label>
                            <input class="form-control" id="dataFinalAgendamento"
                                   th:field="*{dataFinalAgendamento}" type="date">
                            <div class="text-danger small mt-1" th:errors="*{dataFinalAgendamento}"
                                 th:if="${#fields.hasErrors('dataFinalAgendamento')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="horaInicialAgendamento">Hora Inicial Agendamento</label>
                            <input class="form-control" id="horaInicialAgendamento"
                                   th:field="*{horaInicialAgendamento}" type="time">
                            <div class="text-danger small mt-1" th:errors="*{horaInicialAgendamento}"
                                 th:if="${#fields.hasErrors('horaInicialAgendamento')}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="horaFinalAgendamento">Hora Final Agendamento</label>
                            <input class="form-control" id="horaFinalAgendamento"
                                   th:field="*{horaFinalAgendamento}" type="time">
                            <div class="text-danger small mt-1" th:errors="*{horaFinalAgendamento}"
                                 th:if="${#fields.hasErrors('horaFinalAgendamento')}"></div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a class="btn btn-outline-secondary" th:href="@{/recursolista}">Cancelar</a>
                            <button class="btn btn-primary" type="submit">Atualizar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Marcar checkboxes que já estão salvos
    document.addEventListener('DOMContentLoaded', function() {
        var valor = document.getElementById('diasSemanaDisponivel').value;
        if (valor) {
            var dias = valor.split(', ');
            document.querySelectorAll('.dia-check').forEach(function(cb) {
                if (dias.indexOf(cb.value) !== -1) {
                    cb.checked = true;
                }
            });
        }
    });

    // Antes de enviar, juntar checkboxes no campo hidden
    document.querySelector('form').addEventListener('submit', function() {
        var selecionados = [];
        document.querySelectorAll('.dia-check:checked').forEach(function(cb) {
            selecionados.push(cb.value);
        });
        document.getElementById('diasSemanaDisponivel').value = selecionados.join(', ');
    });
</script>

<footer class="footer"><Strong>Equipe: Meta</Strong></footer>
</body>
</html>
