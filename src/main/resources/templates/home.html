<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="home-page">
<nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Gestão de Espaços Corporativos</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/usuariolista}">Usuários</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/recursolista}">Espaços</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reservalista}">Reservas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5 text-center">
    <div class="p-5 mb-4 bg-light rounded-3">
        <div class="container-fluid py-4">
            <h1 class="display-5 fw-bold">Bem-vindo ao sistema!</h1>

            <div class="alert alert-success" role="alert" th:if="${usuario}" th:text="${usuario}">
                Bem-vindo.
            </div>

            <p class="col-md-8 fs-4 mx-auto text-justify">Esta é sua página inicial: Cadastre, Consulte e ou Reserve seu Espaço.</p>

            <div class="d-flex justify-content-center gap-3">
            <a class="btn btn-success btn-lg" th:href="@{/usuariolista}">Acessar Usuários</a>
            <a class="btn btn-primary btn-lg" th:href="@{/recursolista}">Acessar Espaços</a>
            <a class="btn btn-warning btn-lg" th:href="@{/reservalista}">Acessar Reservas</a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<footer class="footer">
    <Strong>Projeto SA Equipe: Tico e Téco</Strong>
</footer>
<style>
    .footer {
        position: fixed;
        bottom: 10px;
        right: 10px;
        font-size: 14px;
        color: #000;
    }
</style>

</body>
</html>
