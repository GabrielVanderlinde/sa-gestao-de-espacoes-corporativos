<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Cancelar Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-warning" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">Gestão de Espaços Corporativos</a>

        <button aria-controls="menuPrincipal" aria-expanded="false" aria-label="Abrir menu" class="navbar-toggler"
                data-bs-target="#menuPrincipal" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Home</a>
                </li>
                <li class="nav-item">
                    <a aria-current="page" class="nav-link active" th:href="@{/reservalista}">Reservas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/logout}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-1">Cancelar Reserva</h1>
                    <p class="text-secondary mb-0">Confirme o cancelamento da reserva selecionada.</p>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>

                    <form method="post" th:action="@{/reservacancelar}" th:object="${reserva}">
                        <input th:field="*{id}" type="hidden">
                        <input th:field="*{usuarioId}" type="hidden">
                        <input th:field="*{recursoId}" type="hidden">
                        <input th:field="*{data}" type="hidden">
                        <input th:field="*{horaInicial}" type="hidden">
                        <input th:field="*{horaFinal}" type="hidden">

                        <div class="mb-3">
                            <label class="form-label">Usuário ID</label>
                            <input class="form-control" disabled th:value="*{usuarioId}" type="text">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Recurso ID</label>
                            <input class="form-control" disabled th:value="*{recursoId}" type="text">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Data</label>
                            <input class="form-control" disabled th:value="*{data}" type="text">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hora Inicial</label>
                            <input class="form-control" disabled th:value="*{horaInicial}" type="text">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Hora Final</label>
                            <input class="form-control" disabled th:value="*{horaFinal}" type="text">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="observacao">Motivo do Cancelamento *</label>
                            <textarea class="form-control" id="observacao" placeholder="Informe o motivo do cancelamento" required
                                      rows="3" th:field="*{observacao}"></textarea>
                            <div class="text-danger small mt-1" th:errors="*{observacao}"
                                 th:if="${#fields.hasErrors('observacao')}">Erro na observação
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a class="btn btn-outline-secondary" th:href="@{/reservalista}">Voltar</a>
                            <button class="btn btn-danger" type="submit">Confirmar Cancelamento</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<footer class="footer">
    <Strong>Equipe: Meta</Strong>
</footer>
<style>
    .footer {
        position: fixed;
        bottom: 10px;
        right: 10px;
        font-size: 14px;
        color: #000;
    }
</style>

</body>
</html>
